apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aeroinbox-ingress
  namespace: aeroinbox
spec:
  ingressClassName: webapprouting.kubernetes.azure.com
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-service-svc
            port:
              number: 8000
