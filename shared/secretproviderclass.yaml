apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: aeroinbox-secret-provider
  namespace: aeroinbox
spec:
  provider: azure
  parameters:
    keyvaultName: kv-aeroinbox-prod
    tenantId: ea3249a3-251c-42d6-96a8-15bb78609c9f
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "6bce6129-2921-4302-ab1f-7e3b069218d0"
    objects: |
      array:
        - |
          objectName: redis-access-key
          objectType: secret
        - |
          objectName: jwt-secret
          objectType: secret
        - |
          objectName: encryption-key
          objectType: secret
        - |
          objectName: postgres-host
          objectType: secret
        - |
          objectName: postgres-db-name
          objectType: secret
        - |
          objectName: postgres-admin-username
          objectType: secret
        - |
          objectName: application-insights-connection-string
          objectType: secret
        - |
          objectName: google-client-id
          objectType: secret
        - |
          objectName: google-client-secret
          objectType: secret
        - |
          objectName: azure-openai-api-key
          objectType: secret
