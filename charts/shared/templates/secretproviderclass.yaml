apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: api-secret-provider
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
spec:
  provider: azure
  parameters:
    keyvaultName: {{ .Values.global.keyVaultName | quote }}
    tenantId: {{ .Values.global.tenantId | quote }}
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ .Values.global.workloadIdentities.api.clientId | quote }}
    objects: |
      array:
        - |
          objectName: redis-access-key
          objectType: secret
        - |
          objectName: jwt-secret
          objectType: secret
        - |
          objectName: encryption-key
          objectType: secret
        - |
          objectName: postgres-host
          objectType: secret
        - |
          objectName: postgres-db-name
          objectType: secret
        - |
          objectName: postgres-admin-username
          objectType: secret
        - |
          objectName: application-insights-connection-string
          objectType: secret
        - |
          objectName: google-client-id
          objectType: secret
        - |
          objectName: google-client-secret
          objectType: secret
        - |
          objectName: azure-openai-api-key
          objectType: secret
        - |
          objectName: service-bus-connection-string
          objectType: secret
  secretObjects:
    - secretName: api-service-secrets
      type: Opaque
      data:
        - objectName: redis-access-key
          key: REDIS_PASSWORD
        - objectName: jwt-secret
          key: JWT_SECRET
        - objectName: encryption-key
          key: ENCRYPTION_KEY
        - objectName: postgres-host
          key: DB_HOST
        - objectName: postgres-db-name
          key: DB_NAME
        - objectName: postgres-admin-username
          key: DB_USER
        - objectName: application-insights-connection-string
          key: APPLICATIONINSIGHTS_CONNECTION_STRING
        - objectName: google-client-id
          key: GOOGLE_CLIENT_ID
        - objectName: google-client-secret
          key: GOOGLE_CLIENT_SECRET
        - objectName: azure-openai-api-key
          key: AZURE_OPENAI_API_KEY
        - objectName: service-bus-connection-string
          key: SERVICE_BUS_CONNECTION_STRING
---
