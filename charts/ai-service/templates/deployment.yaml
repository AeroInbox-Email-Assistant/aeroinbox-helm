apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: aeroinbox
  labels:
    app: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: api-service-sa
      containers:
      - name: ai-service
        image: acraeroinboxprod.azurecr.io/ai-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: 10m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1024Mi
        envFrom:
        - configMapRef:
            name: aeroinbox-config
