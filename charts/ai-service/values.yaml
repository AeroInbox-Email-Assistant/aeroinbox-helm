image:
  repository: ""
  tag: latest
  pullPolicy: Always

replicaCount: 1

service:
  type: ClusterIP
  port: 8000

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

livenessProbe:
  path: /healthz
  port: 8000
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  path: /ready
  port: 8000
  initialDelaySeconds: 10
  periodSeconds: 10

serviceAccount:
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/path: /metrics
  prometheus.io/port: "8000"
