apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: meeting-service-scaler
  namespace: aeroinbox
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: meeting-service
  minReplicaCount: 1
  maxReplicaCount: 5
  cooldownPeriod: 300
  pollingInterval: 30
  triggers:
  - type: azure-servicebus
    metadata:
      queueName: meeting-reminders
      messageCount: "5"
      connectionFromEnv: SERVICE_BUS_CONNECTION_STRING
