image:
  repository: ""
  tag: latest
  pullPolicy: Always

replicaCount: 1

service:
  type: ClusterIP
  port: 8000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  path: /healthz
  port: 8000
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  path: /ready
  port: 8000
  initialDelaySeconds: 10
  periodSeconds: 10

serviceAccount:
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/path: /metrics
  prometheus.io/port: "8000"
