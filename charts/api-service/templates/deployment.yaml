apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: aeroinbox
  labels:
    app: api-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: api-service-sa
      containers:
      - name: api-service
        image: acraeroinboxprod.azurecr.io/api-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 512Mi
        envFrom:
        - configMapRef:
            name: aeroinbox-config
      - name: redis-sidecar
        image: redis:alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 50m
            memory: 128Mi
