apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gmail-service-hpa
  namespace: aeroinbox
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gmail-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
