# Source: aeroinbox/charts/ai-service/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aeroinbox-ai-service
  namespace: aeroinbox
  labels:
    app.kubernetes.io/name: ai-service
    app.kubernetes.io/part-of: aeroinbox
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-service
  template:
    metadata:
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
        prometheus.io/scrape: "true"
      labels:
        app.kubernetes.io/name: ai-service
        app.kubernetes.io/part-of: aeroinbox
        app.kubernetes.io/managed-by: Helm
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: ai-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: ai-service
        image: "acraeroinboxprod.azurecr.io/aeroinbox/ai-service:latest"
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
        ports:
        - containerPort: 8000
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          limits:
            cpu: 1000m
            memory: 1Gi
          requests:
            cpu: 200m
            memory: 256Mi
        env:
        - name: DB_USER
          value: id-aeroinbox-ai-prod
        - name: CACHE_DATABASE_PATH
          value: /tmp/ai_cache.db
        envFrom:
        - configMapRef:
            name: aeroinbox-config
        - secretRef:
            name: ai-service-secrets
        volumeMounts:
        - name: secrets-store
          mountPath: /mnt/secrets
          readOnly: true
      volumes:
      - name: secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: ai-secret-provider

